<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vokex Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
    }
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    #output {
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      border-radius: 8px;
      max-width: 600px;
      width: 100%;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.9rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>🎉 Vokex 应用</h1>
  <p>这是一个使用 Vokex 构建的原生桌面应用</p>

  <div class="button-group">
    <button id="btn-app-info">获取应用信息</button>
    <button id="btn-app-paths">获取应用路径</button>
    <button id="btn-system-paths">获取系统路径</button>
    <button id="btn-locale">获取系统语言</button>
    <button id="btn-single-instance">单实例锁测试</button>
    <button id="btn-events">测试事件监听</button>
    <button id="btn-notification">发送通知</button>
    <button id="btn-restart">重启应用</button>
    <button id="btn-quit">退出应用</button>
  </div>

  <div id="output">点击按钮测试 Vokex app API...</div>

  <script type="module" src="./index.ts"></script>
</body>
</html>
