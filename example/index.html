<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vokex Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
    }
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    #output {
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      border-radius: 8px;
      max-width: 600px;
      width: 100%;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.9rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>🎉 Vokex 应用</h1>
  <p>这是一个使用 Vokex 构建的原生桌面应用</p>

  <div class="button-group">
    <button id="btn-app-info">获取应用信息</button>
    <button id="btn-app-paths">获取应用路径</button>
    <button id="btn-system-paths">获取系统路径</button>
    <button id="btn-locale">获取系统语言</button>
    <button id="btn-single-instance">单实例锁测试</button>
    <button id="btn-events">测试事件监听</button>
    <button id="btn-notification">发送通知</button>
  </div>
  <div class="button-group">
    <button id="btn-fs-demo">文件系统演示</button>
    <button id="btn-fs-read">读取文件</button>
    <button id="btn-fs-read-binary">读取二进制</button>
    <button id="btn-fs-write">写入文件</button>
    <button id="btn-fs-append">追加内容</button>
    <button id="btn-fs-readdir">列目录</button>
    <button id="btn-fs-stat">文件信息</button>
    <button id="btn-fs-copy">复制文件</button>
    <button id="btn-fs-move">移动/重命名</button>
    <button id="btn-fs-delete">删除文件</button>
    <button id="btn-fs-rmdir">删除目录</button>
  </div>
  <div class="button-group">
    <button id="btn-process-info">进程信息</button>
    <button id="btn-process-uptime">运行时长</button>
    <button id="btn-process-cpu">CPU 使用率</button>
    <button id="btn-process-memory">内存信息</button>
  </div>
  <div class="button-group">
    <button id="btn-shell-openexternal">打开 GitHub</button>
    <button id="btn-shell-openpath">打开当前目录</button>
    <button id="btn-shell-exec-dir">执行 dir 命令</button>
    <button id="btn-shell-exec-echo">执行 echo 命令</button>
    <button id="btn-shell-trash">删除测试文件</button>
  </div>
  <div class="button-group">
    <button id="btn-computer-cpu">CPU 信息</button>
    <button id="btn-computer-memory">系统内存</button>
    <button id="btn-computer-os">操作系统</button>
    <button id="btn-computer-displays">显示器</button>
    <button id="btn-computer-mouse">鼠标位置</button>
    <button id="btn-computer-keyboard">键盘布局</button>
  </div>
  <div class="button-group">
    <button id="btn-http-get">HTTP GET</button>
    <button id="btn-http-post">HTTP POST</button>
  </div>
  <div class="button-group">
    <button id="btn-storage-set">设置存储</button>
    <button id="btn-storage-get">获取存储</button>
    <button id="btn-storage-keys">获取所有键</button>
    <button id="btn-storage-has">检查键存在</button>
    <button id="btn-storage-remove">删除键</button>
    <button id="btn-storage-clear">清空存储</button>
  </div>
  <div class="button-group">
    <button id="btn-restart">重启应用</button>
    <button id="btn-quit">退出应用</button>
  </div>

  <div id="output">点击按钮测试 Vokex app API...</div>

  <script type="module" src="./index.ts"></script>
</body>
</html>
